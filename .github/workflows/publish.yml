name: Publish to PyPI

on:
  release:
    types: [published] # Runs automatically when a GitHub Release is published
  workflow_dispatch:   # Lets you run this workflow manually from the Actions tab

jobs:
  pypi-publish:
    name: Build and publish Orra to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/orra
    permissions:
      id-token: write  # Required for trusted publishing with PyPI
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build

      - name: Build the package
        # Build the package from the subfolder
        run: python -m build packages/orra

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Use the built files from the package dist directory
          packages-dir: packages/orra/dist/