name: Publish to PyPI

on:
  release:
    types: [published] # Runs automatically when you create a GitHub Release
  workflow_dispatch:   # Adds a button so you can run it manually from the Actions tab!

jobs:
  pypi-publish:
    name: Build and publish Orra to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/orra
    permissions:
      id-token: write  # IMPORTANT: This allows the secure handshake with PyPI
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build

      - name: Build the package
        # Since your package is in a subfolder, we build it there
        run: python -m build packages/orra

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Tell the action where to find the built files
          packages-dir: packages/orra/dist/