[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "orra"
version = "0.1.1"
description = "Python tracing SDK for the Orra agent debugging dashboard"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [
  { name = "Faraz Mirza", email = "farazmirza1023@gmail.com" }
]
keywords = ["ai", "agents", "tracing", "debugging", "observability"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Debuggers",
]

[project.urls]
Homepage = "https://orra-tracer.vercel.app/"
Repository = "https://github.com/farazmirzax/orra"
LinkedIn = "https://linkedin.com/in/your-profile"

[tool.hatch.build.targets.wheel]
packages = ["src/orra"]
